<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal De Reportes | UDeG</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8f9fa; /* Un blanco muy sutil para contrastar las tarjetas puras */
        }
        .bg-primary { background-color: #0A1433; }
        .text-primary { color: #0A1433; }
        .border-primary { border-color: #0A1433; }
        
        /* Forma geométrica de fondo */
        .clip-diagonal { 
            clip-path: polygon(0 0, 100% 0, 100% 75%, 0% 100%); 
        }
        
        /* Efecto cristal (Glassmorphism) para los elementos gráficos */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-x-hidden">

    <!-- Navbar Flotante Transparente -->
    <header class="absolute top-0 w-full z-50 px-8 py-6 flex justify-between items-center text-white">
        <div class="flex items-center space-x-3">
            <div class="flex align-items-center justify-content-center">
                <img src="Recursos/Imagenes/escudo-dark.svg" alt="UdeG" height="100%">
            </div>
            <span class="text-2xl font-bold tracking-wider">UdeG</span>
        </div>
    </header>
